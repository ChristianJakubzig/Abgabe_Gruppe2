<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Filmdatenbank</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>

<body>
  <!-- Header -->
  <header class="site-header">
    <div class="container">
    </div>
  </header>

  <div class="main-content container">

    <!-- Seitentitel -->
    <h2 class="page-title">Filmübersicht</h2>

    <!-- Toolbar: Suche, Sortierung -->
    <form method="get" th:action="@{/filme}">
      <div class="toolbar">
        <input type="text" name="suche" th:value="${suche}"
               class="search-input"
               placeholder="Suche nach Titel, Genre, Regie oder Land"/>
        <select id="sortierung" name="sortierung" class="sketch-select"
                onchange="this.form.submit()">
          <option value="titel" th:selected="${sortierung == 'titel'}">Titel</option>
          <option value="jahr"  th:selected="${sortierung == 'jahr'}">Jahr</option>
          <option value="genre" th:selected="${sortierung == 'genre'}">Genre</option>
          <option value="regie" th:selected="${sortierung == 'regie'}">Regie</option>
        </select>
        <button type="submit" class="btn-sketch">Suchen</button>
        <a th:href="@{/filme}" class="btn-sketch-reset">Zurücksetzen</a>
      </div>
    </form>

    <!-- Neuen Film hinzufügen -->
    <div class="mb-3">
      <a th:href="@{/filme/neu}" class="btn-sketch">+ Neuen Film hinzufügen</a>
    </div>

    <!-- Filmtabelle -->
    <div class="table-wrapper">
      <table class="film-table">
        <thead>
        <tr>
          <th>Cover</th>
          <th>Titel</th>
          <th>Originaltitel</th>
          <th>Jahr</th>
          <th>Länge</th>
          <th>Genre</th>
          <th>Land</th>
          <th>Regie</th>
          <th>Inhalt</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="film : ${alleFilme}">
          <td>
            <img th:if="${film.bildUrl != null and !film.bildUrl.isEmpty()}"
                 th:src="${film.bildUrl}"
                 alt="Cover"
                 class="cover-img"/>
          </td>
          <td th:text="${film.titel}"></td>
          <td th:text="${film.originaltitel}"></td>
          <td th:text="${film.jahr}"></td>
          <td th:text="${film.laenge}"></td>
          <td th:text="${#strings.listJoin(film.genres.![name], ', ')}"></td>
          <td th:text="${#strings.listJoin(film.laender.![name], ', ')}"></td>
          <td th:text="${#strings.listJoin(film.regisseure.![vorname + ' ' + nachname], ', ')}"></td>
          <td th:text="${film.inhalt}"></td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container">Das Filmarchiv · TH Wildau</div>
  </footer>

</body>
</html>
