<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Neuen Film hinzufügen</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>

<body>
<!-- Header -->
<header class="site-header">
  <div class="container">
  </div>
</header>

<div class="main-content container">
  <h2 class="form-title">Neuen Film hinzufügen</h2>

  <form th:action="@{/filme/neu}" th:object="${film}" method="post">

    <div>
      <label class="form-label-sketch" th:for="titel">Titel<span class="required-star">*</span></label>
      <input class="form-input-sketch" type="text" th:field="*{titel}"/>
      <span class="form-error" th:if="${#fields.hasErrors('titel')}" th:errors="*{titel}"></span>
    </div>

    <div>
      <label class="form-label-sketch" th:for="originaltitel">Originaltitel</label>
      <input class="form-input-sketch" type="text" th:field="*{originaltitel}"/>
    </div>

    <div>
      <label class="form-label-sketch" th:for="jahr">Jahr<span class="required-star">*</span></label>
      <input class="form-input-sketch" type="number" th:field="*{jahr}"/>
      <span class="form-error" th:if="${#fields.hasErrors('jahr')}" th:errors="*{jahr}"></span>
    </div>

    <div>
      <label class="form-label-sketch" th:for="laenge">Länge<span class="required-star">*</span>
        <span class="form-label-hint">(in Minuten)</span>
      </label>
      <input class="form-input-sketch" type="number" th:field="*{laenge}"/>
      <span class="form-error" th:if="${#fields.hasErrors('laenge')}" th:errors="*{laenge}"></span>
    </div>

    <div>
      <label class="form-label-sketch" th:for="inhalt">Inhalt<span class="required-star">*</span></label>
      <textarea class="form-input-sketch" th:field="*{inhalt}" rows="3"></textarea>
      <span class="form-error" th:if="${#fields.hasErrors('inhalt')}" th:errors="*{inhalt}"></span>
    </div>

    <div>
      <label class="form-label-sketch" for="genreEingabe">
        Genres<span class="required-star">*</span>
        <span class="form-label-hint">(mehrere mit Komma trennen, z.B. "Action, Thriller")</span>
      </label>
      <input class="form-input-sketch" type="text" id="genreEingabe" name="genreEingabe"/>
      <span class="form-error" th:if="${#fields.hasErrors('genres')}" th:errors="*{genres}"></span>
    </div>

    <div>
      <label class="form-label-sketch" for="landEingabe">
        Länder<span class="required-star">*</span>
        <span class="form-label-hint">(mehrere mit Komma trennen, z.B. "Deutschland, USA")</span>
      </label>
      <input class="form-input-sketch" type="text" id="landEingabe" name="landEingabe"/>
      <span class="form-error" th:if="${#fields.hasErrors('laender')}" th:errors="*{laender}"></span>
    </div>

    <div>
      <label class="form-label-sketch" for="regisseurEingabe">
        Regisseure<span class="required-star">*</span>
        <span class="form-label-hint">(Format: "Vorname Nachname", mehrere mit Komma trennen)</span>
      </label>
      <input class="form-input-sketch" type="text" id="regisseurEingabe" name="regisseurEingabe"/>
      <span class="form-error" th:if="${#fields.hasErrors('regisseure')}" th:errors="*{regisseure}"></span>
    </div>

    <div>
      <label class="form-label-sketch" th:for="bildUrl">Coverbild-URL
        <span class="form-label-hint">(Tipp: Bild-URL von <a href="https://www.themoviedb.org" target="_blank">themoviedb.org</a>)</span>
      </label>
      <input class="form-input-sketch" type="text" th:field="*{bildUrl}"
             placeholder="z.B. https://image.tmdb.org/t/p/w500/gKY...g6IF.jpg`"/>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-sketch">Film speichern</button>
      <a th:href="@{/filme}" class="btn-sketch-reset">Zurück zur Übersicht</a>
    </div>

    <!-- Anmerkung Pflichtfeld
    <small class="required-note">* Pflichtfeld</small>
    -->

  </form>
</div>

<footer class="site-footer">
  <div class="container">Das Filmarchiv · TH Wildau</div>
</footer>

</body>
</html>
